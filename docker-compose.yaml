services:
  # No app-level db service - the frontend talks to Supabase directly (local Supabase
  # CLI stack for dev/test, hosted Supabase project for prod). See frontend/tests/README.md.
  web:
    command: bash -c "pnpm install && pnpm dev"
    build:
      context: frontend
    volumes:
      - ./frontend:/app
    expose:
      - "3000"
    ports:
      - "3000:3000"
    env_file:
      - ./frontend/.env.local
    environment:
      - CI=true
