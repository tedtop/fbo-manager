services:
  # db service removed - using Supabase instead
  testdb:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: testpass
      POSTGRES_USER: testuser
      POSTGRES_DB: api
    ports:
      - "5433:5432"
    volumes:
      - testdb_data:/var/lib/postgresql/data
    # Used only for local isolated test runs: `LOCAL_TEST_DB=1`
  web:
    command: bash -c "pnpm install -r && pnpm --filter web dev"
    build:
      context: frontend
    volumes:
      - ./frontend:/app
    expose:
      - "3000"
    ports:
      - "3000:3000"
    env_file:
      - ./frontend/apps/web/.env.local
    environment:
      - CI=true

volumes:
  testdb_data:
